<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact CraWings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">CraWings</div>

    <button class="hamburger" aria-label="Open menu">
        ☰
    </button>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="gallery.html">Gallery</a>
    </nav>
</header>

<main>
    <section class="contact-section">

        <div class="map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3012.968937167417!2d-73.84558042369609!3d40.960259322379905!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c2935869b7bfa5%3A0x3ffc77f22cd447c9!2sCravwings!5e0!3m2!1sen!2sus!4v1773161535212!5m2!1sen!2sus"
                width="600"
                height="450"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>

        <div class="contact">
            <h1>Contact Us</h1>

            <form class="contact-form">
                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">
                <textarea placeholder="Message"></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>

    </section>
</main>

<footer>
    <div class="footer-content">

        <div class="hours">
            <h3>Business Hours</h3>
            <p>Mon - Fri: 11 AM - 10 PM</p>
            <p>Sat - Sun: 12 PM - 11 PM</p>
        </div>

        <div class="social">
            <h3>Follow Us</h3>
            <a href="#">Instagram - @CraWings</a>
            <a href="#">Facebook - @CraWings</a>
            <a href="#">Twitter - @CraWings</a>
        </div>

    </div>
</footer>
<script src="nav.js"></script>
</body>
</html>
